<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bern's Maja</title>
    <!-- Laddar in Twemoji för att garantera att flaggorna visas som bilder i alla webbläsare -->
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@14.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <!-- Laddar in Canvas-Confetti för slutanimationen -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #343a40;
            --light: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 10px;
            color: var(--dark);
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-top: 10px; color: var(--dark); }
        .hidden { display: none !important; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        
        /* RADER FÖR INSTÄLLNINGAR (ENBART PILAR) */
        .setup-row {
            display: flex;
            align-items: center;
            background: var(--light);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #dee2e6;
        }
        .setup-input-wrap {
            flex-grow: 1;
        }
        .order-arrows {
            display: flex;
            flex-direction: column;
            margin-left: 15px;
        }
        .arrow-btn {
            background: #e9ecef;
            border: 1px solid #ced4da;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            color: var(--primary);
            margin: 2px 0;
        }
        .arrow-btn:hover { background: #dee2e6; }

        .turn-indicator {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            border: 1px solid #b3e5fc;
        }
        .game-over-banner {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .game-over-banner.lose {
            background: #f8d7da;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        .game-over-banner.win {
            background: #d4edda;
            color: var(--success);
            border: 2px solid var(--success);
        }
        .player-row {
            background: var(--light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-name-title { font-size: 18px; margin: 0; font-weight: bold; color: var(--primary); }
        .score-input {
            width: 80px;
            font-size: 16px;
            text-align: center;
            padding: 8px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #f1f3f5; }
        
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
            width: 24px;
            height: 24px;
        }
        
        .rules-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #ffeeba;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .rules-anchor {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .rules-anchor:hover { text-decoration: underline; }
        .lang-switch { display: flex; gap: 8px; }
        .flag-btn {
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .flag-btn.active {
            border-color: var(--primary);
            background: #e9ecef;
        }
        .flag-btn img.emoji {
            width: 28px;
            height: 28px;
        }
        .live-sum {
            background: #f1f3f5;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
        .live-sum.valid { color: var(--success); }
        .live-sum.invalid { color: var(--danger); background: #f8d7da; }
        
        .app-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            font-size: 13px;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- TOPPBAR: REGLERLÄNK OCH FLAGGBUTTONS -->
    <div class="top-bar">
        <a href="#rulesAnchorPoint" class="rules-anchor" id="lnkRules">Regler</a>
        <div class="lang-switch" id="langSwitchArea">
            <button class="flag-btn active" id="btnLangSv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
            <button class="flag-btn" id="btnLangEn" onclick="setLanguage('en')" title="English">🇬🇧</button>
            <button class="flag-btn" id="btnLangDe" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
        </div>
    </div>

    <h1>Bern's Maja</h1>

    <!-- SKÄRM 1: INSTÄLLNINGAR -->
    <div id="setupScreen">
        <div id="sortableInputsContainer">
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP1" style="font-size: 12px; margin-bottom:2px;">Spelare 1</label>
                    <input type="text" id="p1" value="" placeholder="Spelare 1">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP2" style="font-size: 12px; margin-bottom:2px;">Spelare 2</label>
                    <input type="text" id="p2" value="" placeholder="Spelare 2">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP3" style="font-size: 12px; margin-bottom:2px;">Spelare 3</label>
                    <input type="text" id="p3" value="" placeholder="Spelare 3">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP4" style="font-size: 12px; margin-bottom:2px;">Spelare 4</label>
                    <input type="text" id="p4" value="" placeholder="Spelare 4">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
        </div>
        <button class="btn btn-success" onclick="startGame()" id="btnStart">Starta Spelet</button>
    </div>

    <!-- SKÄRM 2: SPELPLAN -->
    <div id="gameScreen" class="hidden">
        <div class="game-over-banner hidden" id="gameOverBanner">Spelet är slut!</div>

        <h3 id="lblStandings">Nuvarande Ställning</h3>
        <table>
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody>
                <tr id="tableScores"></tr>
            </tbody>
        </table>

        <!-- Inmatningsformulär -->
        <div id="inputArea">
            <h3 id="lblEnterResults" style="margin-top:20px;">Mata in resultat för runda 1</h3>
            <div id="inputsContainer"></div>

            <div id="liveSumDisplay" class="live-sum hidden">Rundans totala poängsumma: 0</div>
            <button class="btn" onclick="saveRound()" id="btnSave">Spara runda</button>
            
            <div class="turn-indicator" id="turnIndicator">Det är Spelare 1s tur att börja!</div>
        </div>
        
        <button class="btn btn-success hidden" id="btnNewGameAfterEnd" onclick="endGame()">Starta nytt spel</button>
        
        <h3 id="lblHistory" style="margin-top:20px;">Historik</h3>
        <table>
            <thead>
                <tr id="historyHeaders"><th>Runda</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>

        <button class="btn btn-danger" onclick="endGame()" id="btnEnd">Avbryt spel</button>
    </div>

    <div id="rulesAnchorPoint"></div>

    <div class="rules-section">
        <h3 id="rulesTitle">Regler för Maja</h3>
        <div id="rulesContent"></div>
    </div>

    <div class="app-footer" id="appFooter">
        Tillägnad Göran Bern som lärde oss alla att spela Maja.
    </div>
</div>

<script>
    let players = [];
    let rounds = [];
    let currentRound = 1;
    let startingPlayerIndex = 0;
    let currentLang = 'sv';
    let isGameOver = false;

    if(localStorage.getItem("maja_p1")) document.getElementById("p1").placeholder = localStorage.getItem("maja_p1");
    if(localStorage.getItem("maja_p2")) document.getElementById("p2").placeholder = localStorage.getItem("maja_p2");
    if(localStorage.getItem("maja_p3")) document.getElementById("p3").placeholder = localStorage.getItem("maja_p3");
    if(localStorage.getItem("maja_p4")) document.getElementById("p4").placeholder = localStorage.getItem("maja_p4");

    const texts = {
        sv: {
            rulesLink: "Regler", turn: "Det är <strong>{name}</strong>s tur att börja!",
            standings: "Nuvarande Ställning", enterRes: "Mata in resultat för runda {r}",
            save: "Spara runda", history: "Historik", end: "Avbryt spel", start: "Starta Spelet",
            round: "Runda", rulesT: "Regler för Maja", newGame: "Starta nytt spel",
            rulesC: `<p>Maja spelas av 4 spelare. Alla kort delas ut. Alla skickar 3 kort till vänster innan start.</p>
                     <p><strong>Poäng:</strong> Varje Hjärter = 1p. Spader Dam = 13p.</p>
                     <p><strong>Nollstick:</strong> Tar man 0 stick får man -26p. Om två gör det delas poängen (-13p var). Om tre spelare får 0 stick får den som har MINST totalpoäng -8p, och de andra två får -9p var.</p>
                     <p><strong>Slutvillkor:</strong> Någon når 52p (förlorar som "Maja"). Någon når ≤ -100p (vinner direkt).</p>`,
            sumText: "Rundans totala poängsumma: {sum} ({status})",
            sumValid: "Giltig runda", sumInvalid: "Ogiltig! Pluspoängen måste vara exakt 26 totalt och minst en spelare måste ha fått ≥ 13 poäng.",
            validationAlert: "Felaktig poänginmatning! Det måste finnas exakt 26 pluspoäng totalt (Hjärter + Spader Dam) fördelat på spelarna, och minst en person måste ha fått minst 13 poäng.",
            confirmDelete: "Vill du verkligen ta bort och ångra senaste rundan?",
            p1Label: "Spelare 1", p2Label: "Spelare 2", p3Label: "Spelare 3", p4Label: "Spelare 4",
            footerText: "Tillägnad Göran Bern som lärde oss alla att spela Maja. ❤️"
        },
        en: {
            rulesLink: "Rules", turn: "It is <strong>{name}</strong>'s turn to start!",
            standings: "Current Standings", enterRes: "Enter results for round {r}",
            save: "Save round", history: "History", end: "End Game", start: "Start Game",
            round: "Round", rulesT: "Maja Rules", newGame: "Start New Game",
            rulesC: `<p>Maja is played by 4 players. All cards are dealt. Everyone passes 3 cards to the left before starting.</p>
                     <p><strong>Scoring:</strong> Each Heart = 1p. Queen of Spades = 13p.</p>
                     <p><strong>Zero Tricks:</strong> Taking 0 tricks gives -26p. Split between two players = -13p each. If three players get 0 tricks, the one with the MINIMUM total score gets -8p, and the other two get -9p each.</p>
                     <p><strong>End Conditions:</strong> First to reach 52p loses ("Maja"). Reaching ≤ -100p wins instantly.</p>`,
            sumText: "Round total score sum: {sum} ({status})",
            sumValid: "Valid round", sumInvalid: "Invalid! Positive points must equal exactly 26, and at least one player must have ≥ 13 points.",
            validationAlert: "Invalid score entry! Positive points must total exactly 26, and at least one person must have at least 13 points.",
            confirmDelete: "Are you sure you want to delete and undo the last round?",
            p1Label: "Player 1", p2Label: "Player 2", p3Label: "Player 3", p4Label: "Player 4",
            footerText: "Dedicated to Göran Bern, who originally taught us all how to play Maja. ❤️"
        },
        de: {
            rulesLink: "Regeln", turn: "<strong>{name}</strong> ist an der Reihe zu beginnen!",
            standings: "Aktueller Spielstand", enterRes: "Ergebnisse für Runde {r} eingeben",
            save: "Runde speichern", history: "Historie", end: "Spiel beenden", start: "Spiel starten",
            round: "Round", rulesT: "Maja-Regeln", newGame: "Neues Spiel starten",
            rulesC: `<p>Maja wird mit 4 Spielern gespielt. Alle Karten werden ausgeteilt. Jeder gibt vor dem Start 3 Karten nach links weiter.</p>
                     <p><strong>Punkte:</strong> Jedes Herz = 1P. Pik-Dame = 13P.</p>
                     <p><strong>Null Stiche:</strong> Wer 0 Stiche macht, bekommt -26P. Wenn dies zwei Spielern gelingt, werden die Punkte geteilt (-13P jeweils). Wenn drei Spieler 0 Stiche machen, erhält derjenige mit der GERINGSTEN Gesamtpunktzahl -8P, die anderen beiden jeweils -9P.</p>
                     <p><strong>Endbedingungen:</strong> Sobald ein Spieler 52P erreicht, verliert er (er ist die "Maja"). Erreicht ein Spieler ≤ -100P, gewinnt er sofort.</p>`,
            sumText: "Gesamtpunktzahl der Runde: {sum} ({status})",
            sumValid: "Gültige Runde", sumInvalid: "Ungültig! Pluspunkte müssen genau 26 sein und mindestens ein Spieler muss ≥ 13 Punkte haben.",
            validationAlert: "Ungültige Punkteingabe! Pluspunkte müssen genau 26 sein und mindestens eine Person muss mindestens 13 Punkte haben.",
            confirmDelete: "Möchten Sie die letzte Runde wirklich löschen und rückgängig machen?",
            p1Label: "Spieler 1", p2Label: "Spieler 2", p3Label: "Spieler 3", p4Label: "Spieler 4",
            footerText: "Gewidmet Göran Bern, der uns allen das Maja-Spielen beigebracht hat. ❤️"
        }
    };

    // Syntetiskt pop-ljud via Web Audio API (inga externa filer krävs)
    function playPopSound() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            // Snabbt stigande frekvens för att skapa ett "pop"-ljud
            osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.12);
            
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        } catch(e) {
            console.log("Kunde inte spela pop-ljud:", e);
        }
    }

    // Talsyntes som läser upp förloraren
    function speakMaja(playerName) {
        if ('speechSynthesis' in window) {
            const textToSpeak = `Nu har ${playerName} blivit Maja! Grattis!`;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'sv-SE';
            utterance.rate = 0.9; // Lite lugnare tempo för tydlighet
            window.speechSynthesis.speak(utterance);
        }
    }

    // Funktion för att spruta konfetti
    function triggerConfetti() {
        if (typeof confetti === 'function') {
            // Skjut konfetti i 3 sekunder från sidorna
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 }
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    }

    function moveRow(button, direction) {
        const row = button.closest('.setup-row');
        const container = document.getElementById('sortableInputsContainer');
        if (direction === -1 && row.previousElementSibling) {
            container.insertBefore(row, row.previousElementSibling);
        } else if (direction === 1 && row.nextElementSibling) {
            container.insertBefore(row, row.nextElementSibling.nextElementSibling);
        }
        updateSetupLabels();
    }

    function updateSetupLabels() {
        const rows = document.querySelectorAll('.setup-row');
        const l = texts[currentLang];
        rows.forEach((row, i) => {
            const label = row.querySelector('label');
            if(i === 0) label.innerText = l.p1Label;
            if(i === 1) label.innerText = l.p2Label;
            if(i === 2) label.innerText = l.p3Label;
            if(i === 3) label.innerText = l.p4Label;
        });
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById("btnLangSv").classList.remove("active");
        document.getElementById("btnLangEn").classList.remove("active");
        document.getElementById("btnLangDe").classList.remove("active");
        
        if(lang === 'sv') document.getElementById("btnLangSv").classList.add("active");
        if(lang === 'en') document.getElementById("btnLangEn").classList.add("active");
        if(lang === 'de') document.getElementById("btnLangDe").classList.add("active");

        updateLanguageDOM();
    }

    function updateLanguageDOM() {
        const l = texts[currentLang];
        document.getElementById("lnkRules").innerText = l.rulesLink;
        document.getElementById("lblStandings").innerText = l.standings;
        document.getElementById("btnSave").innerText = l.save;
        document.getElementById("lblHistory").innerText = l.history;
        document.getElementById("btnEnd").innerText = l.end;
        document.getElementById("btnStart").innerText = l.start;
        document.getElementById("rulesTitle").innerText = l.rulesT;
        document.getElementById("rulesContent").innerHTML = l.rulesC;
        document.getElementById("btnNewGameAfterEnd").innerText = l.newGame;
        document.getElementById("appFooter").innerText = l.footerText;
        
        updateSetupLabels();
        
        if (players.length > 0) {
            if (!isGameOver) updateTurnIndicator();
            document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
            renderTable();
            calculateLiveSum();
            renderHistory();
        }
        twemoji.parse(document.getElementById("langSwitchArea"));
    }

    function startGame() {
        const rows = document.querySelectorAll('.setup-row');
        const pNames = [];

        rows.forEach((row) => {
            const input = row.querySelector('input[type="text"]');
            const finalName = input.value || input.placeholder || "Spelare";
            pNames.push(finalName);
        });

        localStorage.setItem("maja_p1", pNames[0]);
        localStorage.setItem("maja_p2", pNames[1]);
        localStorage.setItem("maja_p3", pNames[2]);
        localStorage.setItem("maja_p4", pNames[3]);

        players = [
            { name: pNames[0], score: 0 },
            { name: pNames[1], score: 0 },
            { name: pNames[2], score: 0 },
            { name: pNames[3], score: 0 }
        ];

        rounds = [];
        currentRound = 1;
        startingPlayerIndex = 0;
        isGameOver = false;

        document.getElementById("setupScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");
        document.getElementById("inputArea").classList.remove("hidden");
        document.getElementById("turnIndicator").classList.remove("hidden");
        document.getElementById("gameOverBanner").className = "game-over-banner hidden";
        document.getElementById("btnNewGameAfterEnd").classList.add("hidden");
        document.getElementById("historyBody").innerHTML = "";
        
        updateLanguageDOM();
        renderInputs(); 
    }

    function updateTurnIndicator() {
        const l = texts[currentLang];
        document.getElementById("turnIndicator").innerHTML = l.turn.replace("{name}", players[startingPlayerIndex].name);
    }

    function renderTable() {
        const head = document.getElementById("tableHeaders");
        const body = document.getElementById("tableScores");
        const histHead = document.getElementById("historyHeaders");
        
        head.innerHTML = "";
        body.innerHTML = "";
        histHead.innerHTML = `<th>${texts[currentLang].round}</th>`;

        players.forEach(p => {
            head.innerHTML += `<th>${p.name}</th>`;
            body.innerHTML += `<td style="font-size:20px; font-weight:bold; color:${p.score >= 52 ? 'var(--danger)' : (p.score <= -100 ? 'var(--success)' : 'inherit')}">${p.score}</td>`;
            histHead.innerHTML += `<th>${p.name}</th>`;
        });
        histHead.innerHTML += `<th></th>`;
    }

    function renderInputs() {
        const container = document.getElementById("inputsContainer");
        container.innerHTML = "";

        players.forEach((p, index) => {
            container.innerHTML += `
                <div class="player-row">
                    <p class="player-name-title">${p.name}</p>
                    <input type="number" id="score_input_${index}" class="score-input" inputmode="numeric" value="" oninput="calculateLiveSum()">
                </div>
            `;
        });
        document.getElementById("liveSumDisplay").classList.add("hidden");
    }

    function computeCurrentScores() {
        let inputScores = [0, 0, 0, 0];
        let totalSum = 0;
        let hasPlayerWithAtLeast13 = false;
        let hasAnyInput = false;
        let zeroCountInRound = 0;

        for(let i=0; i<4; i++) {
            const inputElem = document.getElementById(`score_input_${i}`);
            if(!inputElem) return { scores: [0,0,0,0], isValid: false, hasAnyInput: false, zeroCount: 0 };
            
            if(inputElem.value !== "") {
                hasAnyInput = true;
            }
            
            let val = parseInt(inputElem.value);
            if (isNaN(val)) val = 0; 
            
            if (val === 0) {
                zeroCountInRound++;
            }
            
            inputScores[i] = val;
            totalSum += val;
            if (val >= 13) hasPlayerWithAtLeast13 = true;
        }

        const isValid = (totalSum === 26 && hasPlayerWithAtLeast13);

        return { scores: inputScores, isValid: isValid, hasAnyInput: hasAnyInput, zeroCount: zeroCountInRound };
    }

    function calculateLiveSum() {
        if (isGameOver) return;
        const result = computeCurrentScores();
        const display = document.getElementById("liveSumDisplay");
        const l = texts[currentLang];

        if (!result.hasAnyInput) {
            display.classList.add("hidden");
            return;
        } else {
            display.classList.remove("hidden");
        }

        let currentSum = result.scores.reduce((a, b) => a + b, 0);

        if(result.isValid) {
            display.className = "live-sum valid";
            display.innerHTML = l.sumText.replace("{sum}", currentSum).replace("{status}", l.sumValid);
        } else {
            display.className = "live-sum invalid";
            display.innerHTML = l.sumText.replace("{sum}", currentSum).replace("{status}", l.sumInvalid);
        }
    }

    function saveRound() {
        const result = computeCurrentScores();
        const l = texts[currentLang];

        if(!result.isValid) {
            alert(l.validationAlert);
            return;
        }

        let finalRoundScores = [...result.scores];

        if (result.zeroCount === 3) {
            let zeroIndices = [];
            finalRoundScores.forEach((s, idx) => {
                if (s === 0) zeroIndices.push(idx);
            });

            let lowestTotalScore = Infinity;
            let lowestPlayerIdx = -1;

            zeroIndices.forEach(idx => {
                if (players[idx].score < lowestTotalScore) {
                    lowestTotalScore = players[idx].score;
                    lowestPlayerIdx = idx;
                }
            });

            zeroIndices.forEach(idx => {
                if (idx === lowestPlayerIdx) {
                    finalRoundScores[idx] = -8;
                } else {
                    finalRoundScores[idx] = -9;
                }
            });

        } else if (result.zeroCount === 2) {
            finalRoundScores.forEach((s, idx) => {
                if (s === 0) finalRoundScores[idx] = -13;
            });

        } else if (result.zeroCount === 1) {
            finalRoundScores.forEach((s, idx) => {
                if (s === 0) finalRoundScores[idx] = -26;
            });
        }

        for(let i=0; i<4; i++) {
            players[i].score += finalRoundScores[i];
        }

        rounds.push({ roundNumber: currentRound, scores: finalRoundScores });

        let shouldEnd = false;
        let endMsg = "";
        let isVictory = false;
        let targetMajaPlayer = "";

        players.forEach(p => {
            if(p.score <= -100) {
                endMsg = currentLang === 'sv' ? `${p.name} har nått under -100p och har VUNNIT!` : (currentLang === 'de' ? `${p.name} hat unter -100P erreicht und hat GEWONNEN!` : `${p.name} reached under -100p and has WON!`);
                shouldEnd = true;
                isVictory = true;
            }
            if(p.score >= 52) {
                endMsg = currentLang === 'sv' ? `${p.name} har nått 52p och är MAJA (Förlorare)!` : (currentLang === 'de' ? `${p.name} hat 52P erreicht und ist MAJA (Verlierer)!` : `${p.name} reached 52p and is MAJA (Loser)!`);
                shouldEnd = true;
                targetMajaPlayer = p.name; // Sparar namnet på den som blev Maja
            }
        });

        if(shouldEnd) {
            triggerGameOver(endMsg, isVictory);
            
            // Kör ljud och effekter!
            playPopSound();
            triggerConfetti();
            if (targetMajaPlayer !== "") {
                speakMaja(targetMajaPlayer);
            }
            return;
        }

        currentRound++;
        startingPlayerIndex = (startingPlayerIndex + 1) % 4;
        
        document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
        
        updateTurnIndicator();
        renderTable();
        renderInputs(); 
        renderHistory();
    }

    function renderHistory() {
        const hBody = document.getElementById("historyBody");
        hBody.innerHTML = "";

        for (let i = rounds.length - 1; i >= 0; i--) {
            const r = rounds[i];
            let rowHtml = `<tr><td><strong>R${r.roundNumber}</strong></td>`;
            r.scores.forEach(s => {
                rowHtml += `<td>${s > 0 ? '+' : ''}${s}</td>`;
            });
            
            if (i === rounds.length - 1) {
                rowHtml += `<td><button class="delete-btn" onclick="deleteLastRound()" title="Ångra runda">🗑️</button></td>`;
            } else {
                rowHtml += `<td></td>`;
            }
            
            rowHtml += `</tr>`;
            hBody.innerHTML += rowHtml;
        }
    }

    function deleteLastRound() {
        if (rounds.length === 0) return;
        const l = texts[currentLang];
        
        if (confirm(l.confirmDelete)) {
            const removedRound = rounds.pop();
            for (let i = 0; i < 4; i++) {
                players[i].score -= removedRound.scores[i];
            }

            currentRound--;
            startingPlayerIndex = (startingPlayerIndex - 1 + 4) % 4;

            if (isGameOver) {
                isGameOver = false;
                document.getElementById("inputArea").classList.remove("hidden");
                document.getElementById("turnIndicator").classList.remove("hidden");
                document.getElementById("gameOverBanner").className = "game-over-banner hidden";
                document.getElementById("btnNewGameAfterEnd").classList.add("hidden");
            }

            document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
            updateTurnIndicator();
            renderTable();
            renderInputs();
            renderHistory();
        }
    }

    function triggerGameOver(msg, isVictory) {
        isGameOver = true;
        document.getElementById("inputArea").classList.add("hidden");
        
        const banner = document.getElementById("gameOverBanner");
        banner.innerText = msg;
        
        if(isVictory) {
            banner.className = "game-over-banner win";
        } else {
            banner.className = "game-over-banner lose";
        }
        
        document.getElementById("btnNewGameAfterEnd").classList.remove("hidden");
        renderTable();
        renderHistory();
    }

    function endGame() {
        document.getElementById("setupScreen").classList.remove("hidden");
        document.getElementById("gameScreen").classList.add("hidden");
        
        const rows = document.querySelectorAll('.setup-row');
        players.forEach((p, i) => {
            if(rows[i]) {
                const input = rows[i].querySelector('input[type="text"]');
                input.placeholder = p.name;
                input.value = "";
            }
        });
        
        players = [];
        isGameOver = false;
        updateLanguageDOM();
    }

    window.onload = function() {
        updateLanguageDOM();
    };
</script>
