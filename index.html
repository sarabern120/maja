<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maja Scoreboard</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #343a40;
            --light: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 10px;
            color: var(--dark);
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-top: 0; color: var(--dark); }
        .hidden { display: none !important; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .turn-indicator {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid #b3e5fc;
        }
        .player-row {
            background: var(--light);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
        }
        .player-name-title { font-size: 18px; margin: 0 0 10px 0; color: var(--primary); }
        .controls { display: flex; gap: 10px; align-items: center; }
        select { padding: 8px; border-radius: 6px; font-size: 14px; }
        .toggle-btn {
            padding: 8px 12px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .toggle-btn.active {
            background: #6f42c1;
            color: white;
            border-color: #6f42c1;
        }
        .toggle-btn.active.zero {
            background: var(--success);
            border-color: var(--success);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #f1f3f5; }
        .rules-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #ffeeba;
        }
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: bold; }
        .live-sum {
            background: #f1f3f5;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
        }
        .live-sum.valid { color: var(--success); }
        .live-sum.invalid { color: var(--danger); background: #f8d7da; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">English</button>
    </div>

    <h1>Maja Scoreboard</h1>

    <!-- SKÄRM 1: INSTÄLLNINGAR -->
    <div id="setupScreen">
        <div class="form-group">
            <label id="lblP1">Spelare 1</label>
            <input type="text" id="p1" value="Spelare 1">
        </div>
        <div class="form-group">
            <label id="lblP2">Spelare 2</label>
            <input type="text" id="p2" value="Spelare 2">
        </div>
        <div class="form-group">
            <label id="lblP3">Spelare 3</label>
            <input type="text" id="p3" value="Spelare 3">
        </div>
        <div class="form-group">
            <label id="lblP4">Spelare 4</label>
            <input type="text" id="p4" value="Spelare 4">
        </div>
        <button class="btn btn-success" onclick="startGame()" id="btnStart">Starta Spelet</button>
    </div>

    <!-- SKÄRM 2: SPELPLAN -->
    <div id="gameScreen" class="hidden">
        <div class="turn-indicator" id="turnIndicator">Det är Spelare 1s tur att börja!</div>

        <h3 id="lblStandings">Nuvarande Ställning</h3>
        <table>
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody>
                <tr id="tableScores"></tr>
            </tbody>
        </table>

        <h3 id="lblEnterResults" style="margin-top:20px;">Mata in resultat för runda 1</h3>
        <div id="inputsContainer"></div>

        <!-- REALTIDSSUMMA -->
        <div id="liveSumDisplay" class="live-sum">Rundans totala poängsumma: 0</div>

        <button class="btn" onclick="saveRound()" id="btnSave">Spara runda</button>
        
        <h3 id="lblHistory" style="margin-top:20px;">Historik</h3>
        <table id="historyTable">
            <thead>
                <tr id="historyHeaders"><th>Runda</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>

        <button class="btn btn-danger" onclick="endGame()" id="btnEnd">Avbryt spel</button>
    </div>

    <!-- REGLER -->
    <div class="rules-section">
        <h3 id="rulesTitle">Regler för Maja</h3>
        <div id="rulesContent"></div>
    </div>
</div>

<script>
    let players = [];
    let rounds = [];
    let currentRound = 1;
    let startingPlayerIndex = 0;
    let isSwedish = true;

    if(localStorage.getItem("maja_p1")) document.getElementById("p1").value = localStorage.getItem("maja_p1");
    if(localStorage.getItem("maja_p2")) document.getElementById("p2").value = localStorage.getItem("maja_p2");
    if(localStorage.getItem("maja_p3")) document.getElementById("p3").value = localStorage.getItem("maja_p3");
    if(localStorage.getItem("maja_p4")) document.getElementById("p4").value = localStorage.getItem("maja_p4");

    const texts = {
        sv: {
            langBtn: "English", turn: "Det är <strong>{name}</strong>s tur att börja!",
            standings: "Nuvarande Ställning", enterRes: "Mata in resultat för runda {r}",
            save: "Spara runda", history: "Historik", end: "Avbryt spel", start: "Starta Spelet",
            hearts: "Hjärter:", queen: "♠️ Dam", zero: "0 stick", round: "Runda",
            rulesT: "Regler för Maja",
            rulesC: `<p>Maja spelas av 4 spelare. Alla kort delas ut. Alla skickar 3 kort till vänster innan start.</p>
                     <p><strong>Poäng:</strong> Varje Hjärter = 1p. Spader Dam = 13p.</p>
                     <p><strong>Nollstick:</strong> Tar man 0 stick får man -26p. Om två gör det delas poängen (-13p var). Om tre spelare får 0 stick får den som har högst totalpoäng -8p, och de andra två får -9p var.</p>
                     <p><strong>Slutvillkor:</strong> Någon når 52p (förlorar som "Maja"). Någon når ≤ -100p (vinner direkt). Tar man 26p två gånger i rad förlorar man direkt.</p>`,
            sumText: "Rundans totala poängsumma: {sum} ({status})",
            sumValid: "Giltig runda", sumInvalid: "Ogiltig! Måste vara jämnt delbar med 26 (t.ex. -26, 0, 26)",
            validationAlert: "Felaktig poänginmatning! Summan av rundans poäng ({sum}) är inte jämnt delbar med 26. Kontrollera dina inställningar för hjärter, spader dam och 0 stick."
        },
        en: {
            langBtn: "Svenska", turn: "It is <strong>{name}</strong>'s turn to start!",
            standings: "Current Standings", enterRes: "Enter results for round {r}",
            save: "Save round", history: "History", end: "End Game", start: "Start Game",
            hearts: "Hearts:", queen: "♠️ Queen", zero: "0 tricks", round: "Round",
            rulesT: "Maja Rules",
            rulesC: `<p>Maja is played by 4 players. All cards are dealt. Everyone passes 3 cards to the left before starting.</p>
                     <p><strong>Scoring:</strong> Each Heart = 1p. Queen of Spades = 13p.</p>
                     <p><strong>Zero Tricks:</strong> Taking 0 tricks gives -26p. Split between two players = -13p each. If three players get 0 tricks, the one with the highest total score gets -8p, and the other two get -9p each.</p>
                     <p><strong>End Conditions:</strong> First to reach 52p loses ("Maja"). Reaching ≤ -100p wins instantly. Taking 26p twice in a row results in an instant loss.</p>`,
            sumText: "Round total score sum: {sum} ({status})",
            sumValid: "Valid round", sumInvalid: "Invalid! Must be evenly divisible by 26 (e.g., -26, 0, 26)",
            validationAlert: "Invalid score entry! The total round sum ({sum}) is not evenly divisible by 26. Please check your hearts, queen of spades and 0 trick toggles."
        }
    };

    function updateLanguageDOM() {
        const l = isSwedish ? texts.sv : texts.en;
        document.getElementById("langToggle").innerText = l.langBtn;
        document.getElementById("lblStandings").innerText = l.standings;
        document.getElementById("btnSave").innerText = l.save;
        document.getElementById("lblHistory").innerText = l.history;
        document.getElementById("btnEnd").innerText = l.end;
        document.getElementById("btnStart").innerText = l.start;
        document.getElementById("rulesTitle").innerText = l.rulesT;
        document.getElementById("rulesContent").innerHTML = l.rulesC;
        document.getElementById("lblP1").innerText = isSwedish ? "Spelare 1" : "Player 1";
        document.getElementById("lblP2").innerText = isSwedish ? "Spelare 2" : "Player 2";
        document.getElementById("lblP3").innerText = isSwedish ? "Spelare 3" : "Player 3";
        document.getElementById("lblP4").innerText = isSwedish ? "Spelare 4" : "Player 4";
        
        if (players.length > 0) {
            updateTurnIndicator();
            document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
            renderInputs();
            renderTable();
            calculateLiveSum();
        }
    }

    function toggleLanguage() {
        isSwedish = !isSwedish;
        updateLanguageDOM();
    }

    function startGame() {
        const p1n = document.getElementById("p1").value || "Spelare 1";
        const p2n = document.getElementById("p2").value || "Spelare 2";
        const p3n = document.getElementById("p3").value || "Spelare 3";
        const p4n = document.getElementById("p4").value || "Spelare 4";

        localStorage.setItem("maja_p1", p1n);
        localStorage.setItem("maja_p2", p2n);
        localStorage.setItem("maja_p3", p3n);
        localStorage.setItem("maja_p4", p4n);

        players = [
            { name: p1n, score: 0, consecutiveAll: 0 },
            { name: p2n, score: 0, consecutiveAll: 0 },
            { name: p3n, score: 0, consecutiveAll: 0 },
            { name: p4n, score: 0, consecutiveAll: 0 }
        ];

        rounds = [];
        currentRound = 1;
        startingPlayerIndex = 0;

        document.getElementById("setupScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");
        document.getElementById("historyBody").innerHTML = "";
        
        updateLanguageDOM();
    }

    function updateTurnIndicator() {
        const l = isSwedish ? texts.sv : texts.en;
        document.getElementById("turnIndicator").innerHTML = l.turn.replace("{name}", players[startingPlayerIndex].name);
    }

    function renderTable() {
        const head = document.getElementById("tableHeaders");
        const body = document.getElementById("tableScores");
        const histHead = document.getElementById("historyHeaders");
        
        head.innerHTML = "";
        body.innerHTML = "";
        histHead.innerHTML = `<th>${isSwedish ? 'Runda' : 'Round'}</th>`;

        players.forEach(p => {
            head.innerHTML += `<th>${p.name}</th>`;
            body.innerHTML += `<td style="font-size:20px; font-weight:bold; color:${p.score >= 52 ? 'var(--danger)' : 'inherit'}">${p.score}</td>`;
            histHead.innerHTML += `<th>${p.name}</th>`;
        });
    }

    function renderInputs() {
        const container = document.getElementById("inputsContainer");
        container.innerHTML = "";
        const l = isSwedish ? texts.sv : texts.en;

        players.forEach((p, index) => {
            let options = "";
            for(let i=0; i<=13; i++) options += `<option value="${i}">${i}</option>`;

            container.innerHTML += `
                <div class="player-row">
                    <p class="player-name-title">${p.name}</p>
                    <div class="controls">
                        <span>${l.hearts}</span>
                        <select id="hearts_${index}" onchange="calculateLiveSum()">${options}</select>
                        <button class="toggle-btn" id="queen_${index}" onclick="toggleQueen(${index})">${l.queen}</button>
                        <button class="toggle-btn" id="zero_${index}" onclick="toggleZero(${index})">${l.zero}</button>
                    </div>
                </div>
            `;
        });
    }

    function toggleQueen(idx) {
        document.getElementById(`queen_${idx}`).classList.toggle("active");
        calculateLiveSum();
    }

    function toggleZero(idx) {
        document.getElementById(`zero_${idx}`).classList.toggle("active");
        document.getElementById(`zero_${idx}`).classList.toggle("zero");
        calculateLiveSum();
    }

    // NY FUNKTION: Beräknar poängen i realtid och kollar om det är giltigt
    function computeCurrentScores() {
        let roundScores = [0, 0, 0, 0];
        let zeroPlayers = [];

        for(let i=0; i<4; i++) {
            const hElem = document.getElementById(`hearts_${i}`);
            const qElem = document.getElementById(`queen_${i}`);
            const zElem = document.getElementById(`zero_${i}`);
            
            if(!hElem || !qElem || !zElem) return { scores: [0,0,0,0], sum: 0, isValid: true };

            const hearts = parseInt(hElem.value);
            const hasQueen = qElem.classList.contains("active");
            const isZero = zElem.classList.contains("active");

            roundScores[i] = hearts + (hasQueen ? 13 : 0);
            if(isZero) zeroPlayers.push(i);
        }

        // Specialregel för noll stick
        if(zeroPlayers.length === 1) {
            roundScores[zeroPlayers[0]] = -26;
        } 
        else if(zeroPlayers.length === 2) {
            zeroPlayers.forEach(idx => roundScores[idx] = -13);
        } 
        else if(zeroPlayers.length === 3) {
            let highestScore = -999;
            let playerWithHighestScoreIdx = zeroPlayers[0];

            zeroPlayers.forEach(idx => {
                if(players[idx].score > highestScore) {
                    highestScore = players[idx].score;
                    playerWithHighestScoreIdx = idx;
                }
            });

            zeroPlayers.forEach(idx => {
                if(idx === playerWithHighestScoreIdx) {
                    roundScores[idx] = -8;
                } else {
                    roundScores[idx] = -9;
                }
            });
        }

        const totalSum = roundScores.reduce((a, b) => a + b, 0);
        // Kontroll: Är summan jämnt delbar med 26? (totalSum % 26 === 0)
        const isValid = (totalSum % 26 === 0);

        return { scores: roundScores, sum: totalSum, isValid: isValid };
    }

    function calculateLiveSum() {
        const result = computeCurrentScores();
        const display = document.getElementById("liveSumDisplay");
        const l = isSwedish ? texts.sv : texts.en;

        if(result.isValid) {
            display.className = "live-sum valid";
            display.innerHTML = l.sumText.replace("{sum}", result.sum).replace("{status}", l.sumValid);
        } else {
            display.className = "live-sum invalid";
            display.innerHTML = l.sumText.replace("{sum}", result.sum).replace("{status}", l.sumInvalid);
        }
    }

    function saveRound() {
        const result = computeCurrentScores();
        const l = isSwedish ? texts.sv : texts.en;

        // VALIDERING: Stoppa sparandet om summan inte är jämnt delbar med 26
        if(!result.isValid) {
            alert(l.validationAlert.replace("{sum}", result.sum));
            return;
        }

        let roundScores = result.scores;

        // Kontrollera om någon fick ALLA 26 poäng (regeln om 2 i rad)
        for(let i=0; i<4; i++) {
            if(roundScores[i] === 26) {
                players[i].consecutiveAll++;
                if(players[i].consecutiveAll >= 2) {
                    alert(isSwedish ? 
                        `${players[i].name} tog alla poäng två gånger i rad och har FÖRLORAT direkt!` : 
                        `${players[i].name} took all points twice in a row and LOST instantly!`);
                    endGame();
                    return;
                }
            } else {
                players[i].consecutiveAll = 0;
            }
        }

        // Uppdatera spelarnas totalpoäng
        for(let i=0; i<4; i++) {
            players[i].score += roundScores[i];
        }

        // Lägg till i historik-tabellen
        const hBody = document.getElementById("historyBody");
        let rowHtml = `<tr><td><strong>R${currentRound}</strong></td>`;
        roundScores.forEach(s => {
            rowHtml += `<td>${s > 0 ? '+' : ''}${s}</td>`;
        });
        rowHtml += `</tr>`;
        hBody.innerHTML = rowHtml + hBody.innerHTML;

        // Kontrollera om spelet är slut
        let gameOver = false;
        let msg = "";

        players.forEach(p => {
            if(p.score <= -100) {
                msg = isSwedish ? `${p.name} har nått under -100p och har VUNNIT!` : `${p.name} reached under -100p and has WON!`;
                gameOver = true;
            }
            if(p.score >= 52) {
                msg = isSwedish ? `${p.name} har nått 52p och är MAJA (Förlorare)!` : `${p.name} reached 52p and is MAJA (Loser)!`;
                gameOver = true;
            }
        });

        if(gameOver) {
            alert(msg);
            endGame();
            return;
        }

        // Förbered nästa runda
        currentRound++;
        startingPlayerIndex = (startingPlayerIndex + 1) % 4;
        
        document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
        
        updateTurnIndicator();
        renderTable();
        renderInputs();
        calculateLiveSum();
    }

    function endGame() {
        document.getElementById("setupScreen").classList.remove("hidden");
        document.getElementById("gameScreen").classList.add("hidden");
        players = [];
    }

    updateLanguageDOM();
</script>

</body>
</html>
