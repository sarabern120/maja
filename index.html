<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bern's Maja</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #343a40;
            --light: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 10px;
            color: var(--dark);
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-top: 10px; color: var(--dark); }
        .hidden { display: none !important; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .turn-indicator {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            border: 1px solid #b3e5fc;
        }
        .game-over-banner {
            background: #f8d7da;
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            border: 2px solid var(--danger);
        }
        .player-row {
            background: var(--light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-name-title { font-size: 18px; margin: 0; font-weight: bold; color: var(--primary); }
        .score-input {
            width: 80px;
            font-size: 16px;
            text-align: center;
            padding: 8px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #f1f3f5; }
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }
        .rules-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #ffeeba;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .rules-anchor {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .rules-anchor:hover { text-decoration: underline; }
        .lang-switch { display: flex; gap: 8px; }
        .flag-btn {
            background: none;
            border: 2px solid transparent;
            font-size: 28px; /* Lite större för bättre synlighet */
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            line-height: 1;
        }
        .flag-btn.active {
            border-color: var(--primary);
            background: #e9ecef;
        }
        .live-sum {
            background: #f1f3f5;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
        .live-sum.valid { color: var(--success); }
        .live-sum.invalid { color: var(--danger); background: #f8d7da; }
    </style>
</head>
<body>

<div class="container">
    <!-- TOPPBAR: REGLERLÄNK OCH FLAGGBUTTONS -->
    <div class="top-bar">
        <a href="#rulesAnchorPoint" class="rules-anchor" id="lnkRules">Regler</a>
        <div class="lang-switch">
            <button class="flag-btn active" id="btnLangSv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
            <button class="flag-btn" id="btnLangEn" onclick="setLanguage('en')" title="English">🇬🇧</button>
            <button class="flag-btn" id="btnLangDe" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
        </div>
    </div>

    <h1>Bern's Maja</h1>

    <!-- SKÄRM 1: INSTÄLLNINGAR -->
    <div id="setupScreen">
        <div class="form-group">
            <label id="lblP1">Spelare 1</label>
            <input type="text" id="p1" value="" placeholder="Spelare 1">
        </div>
        <div class="form-group">
            <label id="lblP2">Spelare 2</label>
            <input type="text" id="p2" value="" placeholder="Spelare 2">
        </div>
        <div class="form-group">
            <label id="lblP3">Spelare 3</label>
            <input type="text" id="p3" value="" placeholder="Spelare 3">
        </div>
        <div class="form-group">
            <label id="lblP4">Spelare 4</label>
            <input type="text" id="p4" value="" placeholder="Spelare 4">
        </div>
        <button class="btn btn-success" onclick="startGame()" id="btnStart">Starta Spelet</button>
    </div>

    <!-- SKÄRM 2: SPELPLAN -->
    <div id="gameScreen" class="hidden">
        <!-- Slutskärmsmeddelande överst om klart -->
        <div class="game-over-banner hidden" id="gameOverBanner">Spelet är slut!</div>

        <h3 id="lblStandings">Nuvarande Ställning</h3>
        <table>
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody>
                <tr id="tableScores"></tr>
            </tbody>
        </table>

        <!-- Inmatningsformulär -->
        <div id="inputArea">
            <h3 id="lblEnterResults" style="margin-top:20px;">Mata in resultat för runda 1</h3>
            <div id="inputsContainer"></div>

            <div id="liveSumDisplay" class="live-sum">Rundans totala poängsumma: 0</div>
            <button class="btn" onclick="saveRound()" id="btnSave">Spara runda</button>
            
            <!-- Turordning ligger under knappen -->
            <div class="turn-indicator" id="turnIndicator">Det är Spelare 1s tur att börja!</div>
        </div>
        
        <!-- Knapp som visas när spelet är slut -->
        <button class="btn btn-success hidden" id="btnNewGameAfterEnd" onclick="endGame()">Starta nytt spel</button>
        
        <h3 id="lblHistory" style="margin-top:20px;">Historik</h3>
        <table id="historyTable">
            <thead>
                <tr id="historyHeaders"><th>Runda</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>

        <button class="btn btn-danger" onclick="endGame()" id="btnEnd">Avbryt spel</button>
    </div>

    <!-- ANCHOR POINT FÖR REGLER -->
    <div id="rulesAnchorPoint"></div>

    <!-- REGLER -->
    <div class="rules-section">
        <h3 id="rulesTitle">Regler för Maja</h3>
        <div id="rulesContent"></div>
    </div>
</div>

<script>
    let players = [];
    let rounds = [];
    let currentRound = 1;
    let startingPlayerIndex = 0;
    let currentLang = 'sv';
    let isGameOver = false;

    // Ladda sparade namn som placeholders (ledtext) istället för fasta värden
    if(localStorage.getItem("maja_p1")) document.getElementById("p1").placeholder = localStorage.getItem("maja_p1");
    if(localStorage.getItem("maja_p2")) document.getElementById("p2").placeholder = localStorage.getItem("maja_p2");
    if(localStorage.getItem("maja_p3")) document.getElementById("p3").placeholder = localStorage.getItem("maja_p3");
    if(localStorage.getItem("maja_p4")) document.getElementById("p4").placeholder = localStorage.getItem("maja_p4");

    const texts = {
        sv: {
            rulesLink: "Regler", turn: "Det är <strong>{name}</strong>s tur att börja!",
            standings: "Nuvarande Ställning", enterRes: "Mata in resultat för runda {r}",
            save: "Spara runda", history: "Historik", end: "Avbryt spel", start: "Starta Spelet",
            round: "Runda", rulesT: "Regler för Maja", newGame: "Starta nytt spel",
            rulesC: `<p>Maja spelas av 4 spelare. Alla kort delas ut. Alla skickar 3 kort till vänster innan start.</p>
                     <p><strong>Poäng:</strong> Varje Hjärter = 1p. Spader Dam = 13p.</p>
                     <p><strong>Nollstick:</strong> Tar man 0 stick får man -26p. Om två gör det delas poängen (-13p var). Om tre spelare får 0 stick får den som har högst totalpoäng -8p, and de andra två får -9p var.</p>
                     <p><strong>Slutvillkor:</strong> Någon når 52p (förlorar som "Maja"). Någon når ≤ -100p (vinner direkt). Tar man 26p två gånger i rad förlorar man direkt.</p>`,
            sumText: "Rundans totala poängsumma: {sum} ({status})",
            sumValid: "Giltig runda", sumInvalid: "Ogiltig! Pluspoängen måste vara exakt 26, och summan delbar med 26.",
            validationAlert: "Felaktig poänginmatning! Det måste finnas exakt 26 pluspoäng (värdekort) att fördela per runda innan eventuella minuspoäng dras av.",
            confirmDelete: "Vill du verkligen ta bort och ångra senaste rundan?",
            p1Label: "Spelare 1", p2Label: "Spelare 2", p3Label: "Spelare 3", p4Label: "Spelare 4"
        },
        en: {
            rulesLink: "Rules", turn: "It is <strong>{name}</strong>'s turn to start!",
            standings: "Current Standings", enterRes: "Enter results for round {r}",
            save: "Save round", history: "History", end: "End Game", start: "Start Game",
            round: "Round", rulesT: "Maja Rules", newGame: "Start New Game",
            rulesC: `<p>Maja is played by 4 players. All cards are dealt. Everyone passes 3 cards to the left before starting.</p>
                     <p><strong>Scoring:</strong> Each Heart = 1p. Queen of Spades = 13p.</p>
                     <p><strong>Zero Tricks:</strong> Taking 0 tricks gives -26p. Split between two players = -13p each. If three players get 0 tricks, the one with the highest total score gets -8p, and the other two get -9p each.</p>
                     <p><strong>End Conditions:</strong> First to reach 52p loses ("Maja"). Reaching ≤ -100p wins instantly. Taking 26p twice in a row results in an instant loss.</p>`,
            sumText: "Round total score sum: {sum} ({status})",
            sumValid: "Valid round", sumInvalid: "Invalid! Positive points must equal exactly 26, and total sum divisible by 26.",
            validationAlert: "Invalid score entry! There must be exactly 26 positive points (value cards) distributed per round before any negative points are applied.",
            confirmDelete: "Are you sure you want to delete and undo the last round?",
            p1Label: "Player 1", p2Label: "Player 2", p3Label: "Player 3", p4Label: "Player 4"
        },
        de: {
            rulesLink: "Regeln", turn: "<strong>{name}</strong> ist an der Reihe zu beginnen!",
            standings: "Aktueller Spielstand", enterRes: "Ergebnisse für Runde {r} eingeben",
            save: "Runde speichern", history: "Historie", end: "Spiel beenden", start: "Spiel starten",
            round: "Runde", rulesT: "Maja-Regeln", newGame: "Neues Spiel starten",
            rulesC: `<p>Maja wird mit 4 Spielern gespielt. Alle Karten werden ausgeteilt. Jeder gibt vor dem Start 3 Karten nach links weiter.</p>
                     <p><strong>Punkte:</strong> Jedes Herz = 1P. Pik-Dame = 13P.</p>
                     <p><strong>Null Stiche:</strong> Wer 0 Stiche macht, bekommt -26P. Wenn dies zwei Spielern gelingt, werden die Punkte geteilt (-13P jeweils). Wenn drei Spieler 0 Stiche machen, erhält derjenige mit der höchsten Gesamtpunktzahl -8P, die anderen beiden jeweils -9P.</p>
                     <p><strong>Endbedingungen:</strong> Sobald ein Spieler 52P erreicht, verliert er (er ist die "Maja"). Erreicht ein Spieler ≤ -100P, gewinnt er sofort. Wer zweimal hintereinander alle 26P holt, verliert sofort.</p>`,
            sumText: "Gesamtpunktzahl der Runde: {sum} ({status})",
            sumValid: "Gültige Runde", sumInvalid: "Ungültig! Pluspunkte müssen genau 26 sein und die Summe durch 26 teilbar sein.",
            validationAlert: "Ungültige Punkteingabe! Es müssen genau 26 Pluspunkte (Wertkarten) pro Runde verteilt werden, bevor Minuspunkte verrechnet werden.",
            confirmDelete: "Möchten Sie die letzte Runde wirklich löschen und rückgängig machen?",
            p1Label: "Spieler 1", p2Label: "Spieler 2", p3Label: "Spieler 3", p4Label: "Spieler 4"
        }
    };

    function setLanguage(lang) {
        currentLang = lang;
        
        document.getElementById("btnLangSv").classList.remove("active");
        document.getElementById("btnLangEn").classList.remove("active");
        document.getElementById("btnLangDe").classList.remove("active");
        
        if(lang === 'sv') document.getElementById("btnLangSv").classList.add("active");
        if(lang === 'en') document.getElementById("btnLangEn").classList.add("active");
        if(lang === 'de') document.getElementById("btnLangDe").classList.add("active");

        updateLanguageDOM();
    }

    function updateLanguageDOM() {
        const l = texts[currentLang];
        document.getElementById("lnkRules").innerText = l.rulesLink;
        document.getElementById("lblStandings").innerText = l.standings;
        document.getElementById("btnSave").innerText = l.save;
        document.getElementById("lblHistory").innerText = l.history;
        document.getElementById("btnEnd").innerText = l.end;
        document.getElementById("btnStart").innerText = l.start;
        document.getElementById("rulesTitle").innerText = l.rulesT;
        document.getElementById("rulesContent").innerHTML = l.rulesC;
        document.getElementById("btnNewGameAfterEnd").innerText = l.newGame;
        document.getElementById("lblP1").innerText = l.p1Label;
        document.getElementById("lblP2").innerText = l.p2Label;
        document.getElementById("lblP3").innerText = l.p3Label;
        document.getElementById("lblP4").innerText = l.p4Label;
        
        if (players.length > 0) {
            if (!isGameOver) updateTurnIndicator();
            document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
            renderTable();
            calculateLiveSum();
            renderHistory();
        }
    }

    function startGame() {
        // Om rutan lämnats tom tas värdet från dess placeholder (ledtext)
        const p1n = document.getElementById("p1").value || document.getElementById("p1").placeholder || "Spelare 1";
        const p2n = document.getElementById("p2").value || document.getElementById("p2").placeholder || "Spelare 2";
        const p3n = document.getElementById("p3").value || document.getElementById("p3").placeholder || "Spelare 3";
        const p4n = document.getElementById("p4").value || document.getElementById("p4").placeholder || "Spelare 4";

        localStorage.setItem("maja_p1", p1n);
        localStorage.setItem("maja_p2", p2n);
        localStorage.setItem("maja_p3", p3n);
        localStorage.setItem("maja_p4", p4n);

        players = [
            { name: p1n, score: 0, consecutiveAll: 0 },
            { name: p2n, score: 0, consecutiveAll: 0 },
            { name: p3n, score: 0, consecutiveAll: 0 },
            { name: p4n, score: 0, consecutiveAll: 0 }
        ];

        rounds = [];
        currentRound = 1;
        startingPlayerIndex = 0;
        isGameOver = false;

        document.getElementById("setupScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");
        document.getElementById("inputArea").classList.remove("hidden");
        document.getElementById("turnIndicator").classList.remove("hidden");
        document.getElementById("gameOverBanner").classList.add("hidden");
        document.getElementById("btnNewGameAfterEnd").classList.add("hidden");
        document.getElementById("historyBody").innerHTML = "";
        
        updateLanguageDOM();
        renderInputs(); // Skapar helt tomma poängfält vid start
    }

    function updateTurnIndicator() {
        const l = texts[currentLang];
        document.getElementById("turnIndicator").innerHTML = l.turn.replace("{name}", players[startingPlayerIndex].name);
    }

    function renderTable() {
        const head = document.getElementById("tableHeaders");
        const body = document.getElementById("tableScores");
        const histHead = document.getElementById("historyHeaders");
        
        head.innerHTML = "";
        body.innerHTML = "";
        histHead.innerHTML = `<th>${texts[currentLang].round}</th>`;

        players.forEach(p => {
            head.innerHTML += `<th>${p.name}</th>`;
            body.innerHTML += `<td style="font-size:20px; font-weight:bold; color:${p.score >= 52 ? 'var(--danger)' : 'inherit'}">${p.score}</td>`;
            histHead.innerHTML += `<th>${p.name}</th>`;
        });
        histHead.innerHTML += `<th></th>`;
    }

    function renderInputs() {
        const container = document.getElementById("inputsContainer");
        container.innerHTML = "";

        players.forEach((p, index) => {
            // value="" och placeholder="0" gör att rutorna startar helt tomma men räknas som 0
            container.innerHTML += `
                <div class="player-row">
                    <p class="player-name-title">${p.name}</p>
                    <input type="number" id="score_input_${index}" class="score-input" value="" placeholder="0" oninput="calculateLiveSum()">
                </div>
            `;
        });
        calculateLiveSum();
    }

    function computeCurrentScores() {
        let roundScores = [0, 0, 0, 0];
        let positiveSum = 0;

        for(let i=0; i<4; i++) {
            const inputElem = document.getElementById(`score_input_${i}`);
            if(!inputElem) return { scores: [0,0,0,0], sum: 0, isValid: true };
            
            // Tolka tomt fält som 0
            let val = parseInt(inputElem.value);
            if (isNaN(val)) val = 0; 
            
            roundScores[i] = val;
            if (val > 0) positiveSum += val;
        }

        const totalSum = roundScores.reduce((a, b) => a + b, 0);
        const isValid = (positiveSum === 26 && totalSum % 26 === 0);

        return { scores: roundScores, sum: totalSum, isValid: isValid };
    }

    function calculateLiveSum() {
        if (isGameOver) return;
        const result = computeCurrentScores();
        const display = document.getElementById("liveSumDisplay");
        const l = texts[currentLang];

        if(result.isValid) {
            display.className = "live-sum valid";
            display.innerHTML = l.sumText.replace("{sum}", result.sum).replace("{status}", l.sumValid);
        } else {
            display.className = "live-sum invalid";
            display.innerHTML = l.sumText.replace("{sum}", result.sum).replace("{status}", l.sumInvalid);
        }
    }

    function saveRound() {
        const result = computeCurrentScores();
        const l = texts[currentLang];

        if(!result.isValid) {
            alert(l.validationAlert);
            return;
        }

        let roundScores = result.scores;

        for(let i=0; i<4; i++) {
            if(roundScores[i] === 26) {
                players[i].consecutiveAll++;
                if(players[i].consecutiveAll >= 2) {
                    triggerGameOver(currentLang === 'sv' ? 
                        `${players[i].name} tog alla poäng två gånger i rad och har FÖRLORAT direkt!` : 
                        (currentLang === 'de' ? `${players[i].name} hat zweimal hintereinander alle Punkte geholt und hat sofort VERLOREN!` : `${players[i].name} took all points twice in a row and LOST instantly!`));
                    return;
                }
            } else {
                players[i].consecutiveAll = 0;
            }
        }

        for(let i=0; i<4; i++) {
            players[i].score += roundScores[i];
        }

        rounds.push({ roundNumber: currentRound, scores: [...roundScores] });

        let shouldEnd = false;
        let endMsg = "";

        players.forEach(p => {
            if(p.score <= -100) {
                endMsg = currentLang === 'sv' ? `${p.name} har nått under -100p och har VUNNIT!` : (currentLang === 'de' ? `${p.name} hat unter -100P erreicht und hat GEWONNEN!` : `${p.name} reached under -100p and has WON!`);
                shouldEnd = true;
            }
            if(p.score >= 52) {
                endMsg = currentLang === 'sv' ? `${p.name} har nått 52p och är MAJA (Förlorare)!` : (currentLang === 'de' ? `${p.name} hat 52P erreicht und ist MAJA (Verlierer)!` : `${p.name} reached 52p and is MAJA (Loser)!`);
                shouldEnd = true;
            }
        });

        if(shouldEnd) {
            triggerGameOver(endMsg);
            return;
        }

        currentRound++;
        startingPlayerIndex = (startingPlayerIndex + 1) % 4;
        
        document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
        
        updateTurnIndicator();
        renderTable();
        renderInputs(); // Rensar fälten helt inför nästa runda
        renderHistory();
    }

    function renderHistory() {
        const hBody = document.getElementById("historyBody");
        hBody.innerHTML = "";

        for (let i = rounds.length - 1; i >= 0; i--) {
            const r = rounds[i];
            let rowHtml = `<tr><td><strong>R${r.roundNumber}</strong></td>`;
            r.scores.forEach(s => {
                rowHtml += `<td>${s > 0 ? '+' : ''}${s}</td>`;
            });
            
            if (i === rounds.length - 1) {
                rowHtml += `<td><button class="delete-btn" onclick="deleteLastRound()" title="Ångra runda">🗑️</button></td>`;
            } else {
                rowHtml += `<td></td>`;
            }
            
            rowHtml += `</tr>`;
            hBody.innerHTML += rowHtml;
        }
    }

    function deleteLastRound() {
        if (rounds.length === 0) return;
        const l = texts[currentLang];
        
        if (confirm(l.confirmDelete)) {
            const removedRound = rounds.pop();
            
            for (let i = 0; i < 4; i++) {
                players[i].score -= removedRound.scores[i];
                if (removedRound.scores[i] === 26 && players[i].consecutiveAll > 0) {
                    players[i].consecutiveAll--;
                }
            }

            currentRound--;
            startingPlayerIndex = (startingPlayerIndex - 1 + 4) % 4;

            if (isGameOver) {
                isGameOver = false;
                document.getElementById("inputArea").classList.remove("hidden");
                document.getElementById("turnIndicator").classList.remove("hidden");
                document.getElementById("gameOverBanner").classList.add("hidden");
                document.getElementById("btnNewGameAfterEnd").classList.add("hidden");
            }

            document.getElementById("lblEnterResults").innerText = l.enterRes.replace("{r}", currentRound);
            updateTurnIndicator();
            renderTable();
            renderInputs();
            renderHistory();
        }
    }

    function triggerGameOver(msg) {
        isGameOver = true;
        document.getElementById("inputArea").classList.add("hidden");
        
        const banner = document.getElementById("gameOverBanner");
        banner.innerText = msg;
        banner.classList.remove("hidden");
        document.getElementById("btnNewGameAfterEnd").classList.remove("hidden");
        
        renderTable();
        renderHistory();
    }

    function endGame() {
        document.getElementById("setupScreen").classList.remove("hidden");
        document.getElementById("gameScreen").classList.add("hidden");
        
        // Återställ rutorna inför nästa gång de ska skriva in namn
        if (players.length > 0) {
            document.getElementById("p1").placeholder = players[0].name;
            document.getElementById("p2").placeholder = players[1].name;
            document.getElementById("p3").placeholder = players[2].name;
            document.getElementById("p4").placeholder = players[3].name;
        }
        document.getElementById("p1").value = "";
        document.getElementById("p2").value = "";
        document.getElementById("p3").value = "";
        document.getElementById("p4").value = "";
        
        players = [];
        isGameOver = false;
    }

    updateLanguageDOM();
</script>

</body>
</html>
