<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bern's Maja</title>
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@14.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #343a40;
            --light: #f8f9fa;
        }
        html, body {
            margin: 0;
            padding: 0;
            background-color: #e9ecef;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--dark);
        }
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            transition: max-width 0.2s ease;
        }
        h1 { text-align: center; margin: 5px 0 10px 0; color: var(--dark); font-size: 24px; }
        h3 { margin: 15px 0 8px 0; font-size: 18px; }
        .hidden { display: none !important; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            box-sizing: border-box;
        }
        label { display: block; margin-bottom: 3px; font-weight: bold; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        
        /* RADER FÖR INSTÄLLNINGAR */
        .setup-row {
            display: flex;
            align-items: center;
            background: var(--light);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #dee2e6;
        }
        .setup-input-wrap { flex-grow: 1; }
        .order-arrows { display: flex; flex-direction: column; margin-left: 12px; }
        .arrow-btn {
            background: #e9ecef;
            border: 1px solid #ced4da;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            color: var(--primary);
            margin: 2px 0;
        }

        .turn-indicator {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 12px;
            border: 1px solid #b3e5fc;
            font-size: 15px;
        }
        .game-over-banner {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .game-over-banner.lose { background: #f8d7da; color: var(--danger); border: 2px solid var(--danger); }
        .game-over-banner.win { background: #d4edda; color: var(--success); border: 2px solid var(--success); }
        
        /* UTGÅNGSPUNKT FÖR INMATNINGSRADERNA */
        .player-row {
            background: var(--light);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        
        .player-name-title { 
            font-size: 16px; 
            margin: 0; 
            font-weight: bold; 
            color: var(--primary); 
            word-break: break-word;
            margin-right: 15px;
            flex-grow: 1;
        }
        
        .score-input {
            width: 80px !important;
            min-width: 80px !important;
            max-width: 80px !important;
            font-size: 16px;
            text-align: center;
            padding: 8px 6px;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; table-layout: fixed; }
        th { background: #f1f3f5; font-size: 13px; word-break: break-word; white-space: normal; font-weight: bold; }
        td { padding: 6px; text-align: center; border-bottom: 1px solid #ddd; word-break: break-word; white-space: normal; }
        
        .col-round { width: 50px !important; min-width: 50px !important; max-width: 50px !important; }
        .col-trash { width: 35px !important; min-width: 35px !important; max-width: 35px !important; }
        
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            width: 24px;
            height: 24px;
            display: inline-block;
        }
        
        .rules-section {
            background: #fff3cd;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #ffeeba;
            font-size: 14px;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .rules-anchor { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px; cursor: pointer; }
        .lang-switch { display: flex; gap: 6px; }
        .flag-btn {
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
        }
        .flag-btn.active { border-color: var(--primary); background: #e9ecef; }
        .flag-btn img.emoji { width: 24px; height: 24px; }
        
        .live-sum {
            background: #f1f3f5;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-top: 12px;
            font-size: 14px;
        }
        .live-sum.valid { color: var(--success); }
        .live-sum.invalid { color: var(--danger); background: #f8d7da; }
        
        .app-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #ccc;
            font-size: 12px;
            color: #6c757d;
            font-style: italic;
        }

        .game-layout { display: flex; flex-direction: column; }

        @media screen and (orientation: landscape) and (max-height: 768px) {
            body {
                align-items: flex-start !important;
                padding-top: 5px;
            }
            .container {
                max-width: 760px;
                padding: 12px;
            }
            .game-layout {
                flex-direction: row;
                gap: 20px;
            }
            .column-left {
                flex: 1;
            }
            .column-right {
                flex: 1;
            }
            h1 { font-size: 20px; margin-bottom: 5px; }
            .player-row { padding: 6px 10px; margin-bottom: 5px; }
            .btn { padding: 10px; margin-top: 8px; font-size: 15px; }
            .turn-indicator { padding: 8px; margin-top: 8px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <span class="rules-anchor" id="lnkRules" onclick="toggleRules()">Regler</span>
        <div class="lang-switch" id="langSwitchArea">
            <button class="flag-btn active" id="btnLangSv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
            <button class="flag-btn" id="btnLangEn" onclick="setLanguage('en')" title="English">🇬🇧</button>
            <button class="flag-btn" id="btnLangDe" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
        </div>
    </div>

    <h1>Bern's Maja</h1>

    <div id="setupScreen">
        <div id="sortableInputsContainer">
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP1" style="font-size: 12px; margin-bottom:2px;">Spelare 1</label>
                    <input type="text" id="p1" value="" placeholder="Spelare 1">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP2" style="font-size: 12px; margin-bottom:2px;">Spelare 2</label>
                    <input type="text" id="p2" value="" placeholder="Spelare 2">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP3" style="font-size: 12px; margin-bottom:2px;">Spelare 3</label>
                    <input type="text" id="p3" value="" placeholder="Spelare 3">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
            <div class="setup-row">
                <div class="setup-input-wrap">
                    <label id="lblP4" style="font-size: 12px; margin-bottom:2px;">Spelare 4</label>
                    <input type="text" id="p4" value="" placeholder="Spelare 4">
                </div>
                <div class="order-arrows">
                    <button class="arrow-btn" onclick="moveRow(this, -1)">▲</button>
                    <button class="arrow-btn" onclick="moveRow(this, 1)">▼</button>
                </div>
            </div>
        </div>
        <button class="btn" onclick="startGame()" id="btnStart">Starta Spelet</button>
    </div>

    <div id="gameScreen" class="hidden">
        <div class="game-over-banner hidden" id="gameOverBanner">Spelet är slut!</div>

        <div class="game-layout">
            <div class="column-left">
                <h3 id="lblStandings">Nuvarande Ställning</h3>
                <table>
                    <thead>
                        <tr id="tableHeaders"></tr>
                    </thead>
                    <tbody>
                        <tr id="tableScores"></tr>
                    </tbody>
                </table>

                <div id="inputArea">
                    <h3 id="lblEnterResults">Mata in resultat för runda {r}</h3>
                    <div id="inputsContainer"></div>

                    <div id="liveSumDisplay" class="live-sum hidden">Rundans totala poängsumma: 0</div>
                    <button class="btn" onclick="saveRound()" id="btnSave">Spara runda</button>
                    
                    <div class="turn-indicator" id="turnIndicator">Det är Spelare 1s tur att börja!</div>
                </div>
                
                <button class="btn" id="btnNewGameMain" onclick="confirmEndGame()">Starta nytt spel</button>
            </div>
            
            <div class="column-right">
                <h3 id="lblHistory">Historik</h3>
                <table>
                    <thead>
                        <tr id="historyHeaders"><th class="col-round">Runda</th></tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="rules-section hidden" id="rulesBlock">
        <h3 id="rulesTitle">Regler för Maja</h3>
        <div id="rulesContent"></div>
    </div>

    <div class="app-footer" id="appFooter">
        Tillägnad Göran Bern som lärde oss alla att spela Maja.
    </div>
</div>

<script>
    // =========================================================================
    // GLOBALA VARIABLER (Applikationens tillstånd/State)
    // =========================================================================
    let players = [];              // Array med objekt för de 4 spelarna: [{name: "...", score: 0}, ...]
    let rounds = [];               // Array som sparar historiken för varje sparad runda
    let currentRound = 1;          // Räknare för aktuell runda
    let startingPlayerIndex = 0;   // Håller reda på vem som ska lägga första kortet (roterar varje runda)
    let currentLang = 'sv';        // Aktivt språk i gränssnittet
    let isGameOver = false;        // Flagga som blir sann när matchen har nått sitt slutvillkor

    // Hämta sparade spelarnamn från tidigare matcher om de finns i webbläsarens minne
    if(localStorage.getItem("maja_p1")) document.getElementById("p1").placeholder = localStorage.getItem("maja_p1");
    if(localStorage.getItem("maja_p2")) document.getElementById("p2").placeholder = localStorage.getItem("maja_p2");
    if(localStorage.getItem("maja_p3")) document.getElementById("p3").placeholder = localStorage.getItem("maja_p3");
    if(localStorage.getItem("maja_p4")) document.getElementById("p4").placeholder = localStorage.getItem("maja_p4");

    // Språköversättningar för UI-texter samt regelsamling
    const texts = {
        sv: {
            rulesLink: "Regler", 
            turn: "Det är <strong>{name}</strong>s tur att börja!",
            turnGenitiveExempt: "Det är <strong>{name}</strong> tur att börja!",
            standings: "Nuvarande Ställning", enterRes: "Mata in resultat för runda {r}",
            save: "Spara runda", history: "Historik", newGame: "Starta nytt spel", start: "Starta Spelet",
            round: "Runda", rulesT: "Regler för Maja",
            rulesC: `<p>Maja spelas av 4 spelare med en vanlig kortlek med 52 kort. Alla kort delas ut. Alla skickar 3 kort till vänster innan start.</p>
                     <p><strong>Poäng:</strong> Varje Hjärter = 1p. Spader Dam = 13p.</p>
                     <p><strong>Nollstick:</strong> Tar man 0 stick får man -26p. Om två gör det delas poängen (-13p var). Om three spelare får 0 stick får den som har MINST totalpoäng -8p, och de andra två får -9p var.</p>
                     <p><strong>Slutvillkor:</strong> Någon når 52p (förlorar som "Maja"). Någon når ≤ -100p (vinner direkt).</p>`,
            sumText: "Rundans totala poängsumma: {sum} ({status})",
            sumValid: "Giltig runda", sumInvalid: "Ogiltig! Pluspoängen måste vara exakt 26 totalt och minst en spelare måste ha fått ≥ 13 poäng.",
            validationAlert: "Felaktig poänginmatning! Det måste finnas exakt 26 pluspoäng totalt (Hjärter + Spader Dam) fördelat på spelarna, inga minusvärden tillåtna, och minst en person måste ha fått minst 13 poäng.",
            confirmDelete: "Vill du verkligen ta bort och ångra senaste rundan?",
            confirmReset: "Vill du verkligen starta ett helt nytt spel. Alla rundor raderas då.",
            p1Label: "Spelare 1", p2Label: "Spelare 2", p3Label: "Spelare 3", p4Label: "Spelare 4",
            footerText: "Tillägnad Göran Bern som lärde oss alla att spela Maja. ❤️",
            ttsMaja: "Nu har {name} blivit Maja! Grattis!!!"
        },
        en: {
            rulesLink: "Rules", 
            turn: "It is <strong>{name}</strong>'s turn to start!",
            turnGenitiveExempt: "It is <strong>{name}</strong>' turn to start!",
            standings: "Current Standings", enterRes: "Enter results for round {r}",
            save: "Save round", history: "History", newGame: "Start new game", start: "Start Game",
            round: "Round", rulesT: "Maja Rules",
            rulesC: `<p>Maja is played by 4 players with a standard 52-card deck. All cards are dealt. Everyone passes 3 cards to the left before starting.</p>
                     <p><strong>Scoring:</strong> Each Heart = 1p. Queen of Spades = 13p.</p>
                     <p><strong>Zero Tricks:</strong> Taking 0 tricks gives -26p. Split between two players = -13p each. If three players get 0 tricks, the one with the MINIMUM total score gets -8p, and the other two get -9p each.</p>
                     <p><strong>End Conditions:</strong> First to reach 52p loses ("Maja"). Reaching ≤ -100p wins instantly.</p>`,
            sumText: "Round total score sum: {sum
